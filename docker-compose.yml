version: '3.8'

services:    
  file-service:
    build: .
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    depends_on:
      - file-db
    volumes:
      - ./uploads:/uploads
    restart: unless-stopped
    networks:
      - app-network

  file-db:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${FILE_PG_NAME}
      - POSTGRES_USER=${FILE_PG_USER}
      - POSTGRES_PASSWORD=${FILE_PG_PASS}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - file-db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FILE_PG_USER} -d ${FILE_PG_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  file-db_data:
  go-modules:

networks:
  app-network:
    driver: bridge